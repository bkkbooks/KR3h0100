body:
  text: 棋手勢一卷唐宣宗時大中中日本國王子來朝獻寶器音樂上設百戲珍饌以禮焉王子善圍棋上敕顧師言待詔為對手王子出如楸玉局冷煖玉棋子云本國之東三萬里有集真島島上有凝霞臺上有手談池池中生玉棋子不由制度自然黑白分明冬溫夏冷故謂冷煖玉又產如楸玉類楸木琢之為局光潔可鑒及師言與之敵手至三十三下勝負未決師言懼辱君命而汗下凝思方敢落指謂之鎮神頭乃是解兩征勢也王子瞪目縮臂以伏不勝廻語鴻臚曰待詔第幾手耶鴻臚跪對曰第三師言實逸國手矣王子曰願見第一曰王子勝第三得見第二勝第二得見第一今欲躁見第一其可得乎王子掩局而吁曰小國之一不如大國之三信矣今好事者尚有顧師言三十三下鎮神頭圖
